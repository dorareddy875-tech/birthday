<!DOCTYPE html>
<html>
<head>
  <title>Happy Birthday Ammu 🎂</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      text-align: center;
      font-family: Arial;
      background: radial-gradient(circle,#ff758c,#ff7eb3);
      color: white;
      margin: 0;
      padding: 10px;
      overflow-x: hidden;
    }

    #name {
      font-size: 28px;
      font-weight: bold;
      animation: glow 2s infinite alternate;
    }

    @keyframes glow {
      from {text-shadow: 0 0 10px #ff4da6;}
      to {text-shadow: 0 0 25px #fff;}
    }

    #typing {
      margin-top: 10px;
      border-right: 2px solid white;
      display: inline-block;
      white-space: nowrap;
      overflow: hidden;
    }

    #photos {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
      margin: 20px;
    }

    #photos img {
      width: 120px;
      height: 120px;
      border-radius: 10px;
      border: 3px solid white;
      object-fit: cover;
    }

    #cake {
      font-size: 120px;
      margin-top: 20px;
      cursor: pointer;
    }

    @keyframes cutCake {
      0% { transform: scale(1); }
      50% { transform: scale(1.2) rotate(-10deg); }
      100% { transform: scale(1); }
    }

    .cut {
      animation: cutCake 0.6s ease;
    }

    .explosion {
      position: fixed;
      font-size: 30px;
      animation: explode 1s ease-out;
    }

    @keyframes explode {
      0% {transform: scale(0);}
      100% {transform: scale(3); opacity: 0;}
    }
  </style>
</head>

<body>

<h1>Happy Birthday 🎂✨<br>
<span id="name">Hema Sri (Ammu) 💖</span></h1>

<div id="typing"></div>

<div id="photos">
  <img src="a.jpeg">
  <img src="b.jpeg">
</div>

<p>Tap the cake 🎂</p>

<div id="cake">🎂</div>

<audio id="music" loop>
  <source src="gaali_vaaluga.mp3" type="audio/mpeg">
</audio>

<script>
let text = "Main Character Today 👑💖";
let i = 0;

function type() {
  if (i < text.length) {
    document.getElementById("typing").innerHTML += text.charAt(i);
    i++;
    setTimeout(type, 80);
  } else {
    explosion();
  }
}
type();

function explosion() {
  for (let i = 0; i < 30; i++) {
    let e = document.createElement("div");
    e.className = "explosion";
    e.innerHTML = ["🎉","✨","💖","🎊"][Math.floor(Math.random()*4)];
    e.style.left = Math.random()*100 + "vw";
    e.style.top = Math.random()*60 + "vh";
    document.body.appendChild(e);
    setTimeout(() => e.remove(), 1000);
  }
}

const cake = document.getElementById("cake");
const music = document.getElementById("music");

cake.addEventListener("click", () => {

  // 🎶 play song
  music.play().catch(()=>{});

  // 🎂 animation
  cake.classList.add("cut");

  setTimeout(() => {
    cake.innerHTML = "🍰🍰";
  }, 300);

  explosion();
});
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>Happy Birthday Ammu 🎂</title>

  <!-- IMPORTANT for mobile -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      text-align: center;
      font-family: Arial;
      background: radial-gradient(circle,#ff758c,#ff7eb3);
      color: white;
      margin: 0;
      padding: 10px;
      overflow-x: hidden;
    }

    h1 {
      margin-top: 20px;
      font-size: clamp(20px, 5vw, 36px);
    }

    #name {
      font-size: clamp(22px, 6vw, 34px);
      font-weight: bold;
      animation: glow 2s infinite alternate;
    }

    @keyframes glow {
      from {text-shadow: 0 0 10px #ff4da6;}
      to {text-shadow: 0 0 25px #fff;}
    }

    #typing {
      font-size: clamp(16px, 4vw, 22px);
      margin-top: 10px;
      border-right: 2px solid white;
      display: inline-block;
      white-space: nowrap;
      overflow: hidden;
    }

    #bear {
      font-size: clamp(40px, 10vw, 60px);
      margin-top: 10px;
    }

    #photos {
      display: flex;
      justify-content: center;
      flex-wrap: wrap; /* mobile fix */
      gap: 10px;
      margin: 20px 10px;
    }

    #photos img {
      width: clamp(100px, 30vw, 140px);
      height: clamp(100px, 30vw, 140px);
      border-radius: 10px;
      border: 3px solid white;
      object-fit: cover;
    }

    #cakeBox {
      margin-top: 20px;
    }

    #cake {
      font-size: clamp(80px, 20vw, 170px);
    }

    .explosion {
      position: fixed;
      font-size: 30px;
      animation: explode 1s ease-out;
    }

    @keyframes explode {
      0% {transform: scale(0);}
      100% {transform: scale(3); opacity: 0;}
    }
  </style>
</head>

<body>

<h1>
  Happy Birthday 🎂✨<br>
  <span id="name">Hema Sri (Ammu) 💖</span>
</h1>

<div id="bear">🐻💖</div>

<div id="typing"></div>

<div id="photos">
  <img src="a.jpeg" />
  <img src="b.jpeg" />
</div>

<div id="cakeBox">
  <div id="cake">🎂</div>
</div>

<!-- Audio Fix -->
<audio id="music" loop>
  <source src="gaali_vaaluga.mp3" type="audio/mpeg">
</audio>

<script>

let text = "Main Character Today 👑💖";
let i = 0;

function type() {
  if (i < text.length) {
    document.getElementById("typing").innerHTML += text.charAt(i);
    i++;
    setTimeout(type, 80);
  } else {
    explosion();
  }
}
type();

function explosion() {
  for (let i = 0; i < 40; i++) {
    let e = document.createElement("div");
    e.className = "explosion";
    e.innerHTML = ["💥","✨","💖","🎇"][Math.floor(Math.random()*4)];
    e.style.left = Math.random()*100 + "vw";
    e.style.top = Math.random()*60 + "vh";
    document.body.appendChild(e);
    setTimeout(() => e.remove(), 1000);
  }
}

/* MOBILE AUDIO FIX (autoplay restriction) */
document.body.addEventListener("click", () => {
  document.getElementById("music").play();
}, { once: true });

</script>

</body>
</html>

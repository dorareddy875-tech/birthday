<!DOCTYPE html>
<html>
<head>
  <title>Happy Birthday Ammu 🎂</title>

  <style>
    body {
      text-align: center;
      font-family: Arial;
      background: radial-gradient(circle,#ff758c,#ff7eb3);
      color: white;
      overflow: hidden;
    }

    h1 { margin-top: 30px; }

    #name {
      font-size: 34px;
      font-weight: bold;
      animation: glow 2s infinite alternate;
    }

    @keyframes glow {
      from {text-shadow: 0 0 10px #ff4da6;}
      to {text-shadow: 0 0 25px #fff;}
    }

    #typing {
      font-size: 22px;
      margin-top: 10px;
      border-right: 2px solid white;
      display: inline-block;
      white-space: nowrap;
      overflow: hidden;
    }

    #bear { font-size: 60px; }

    #photos {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin: 20px;
    }

    #photos img {
      width: 120px;
      height: 120px;
      border-radius: 10px;
      border: 3px solid white;
      object-fit: cover;
    }

    #cakeBox {
      position: absolute;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
    }

    #cake { font-size: 170px; }

    .explosion {
      position: fixed;
      font-size: 30px;
      animation: explode 1s ease-out;
    }

    @keyframes explode {
      0% {transform: scale(0);}
      100% {transform: scale(3); opacity: 0;}
    }
  </style>
</head>

<body>

<h1>
  Happy Birthday 🎂✨<br>
  <span id="name">Hema Sri (Ammu) 💖</span>
</h1>

<div id="bear">🐻💖</div>

<div id="typing"></div>

<div id="photos">
  <img src="./a.jpeg" />
  <img src="./b.jpeg" />
</div>

<div id="cakeBox">
  <div id="cake">🎂</div>
</div>

<audio autoplay loop>
  <source src="gaali_vaaluga.mp3" type="audio/mpeg">
</audio>

<script>

let text = "Main Character Today 👑💖";
let i = 0;

function type() {
  if (i < text.length) {
    document.getElementById("typing").innerHTML += text.charAt(i);
    i++;
    setTimeout(type, 80);
  } else {
    explosion();
  }
}
type();

function explosion() {
  for (let i = 0; i < 40; i++) {
    let e = document.createElement("div");
    e.className = "explosion";
    e.innerHTML = ["💥","✨","💖","🎇"][Math.floor(Math.random()*4)];
    e.style.left = Math.random()*100 + "vw";
    e.style.top = Math.random()*60 + "vh";
    document.body.appendChild(e);
    setTimeout(() => e.remove(), 1000);
  }
}

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>Question ❤️</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      display: flex;
      flex-direction: column;
      justify-content: center;  /* vertical center */
      align-items: center;      /* horizontal center */
      height: 100vh;
      margin: 0;
      font-family: Arial;
      background: linear-gradient(to right,#ff758c,#ff7eb3);
      color: white;
      text-align: center;
      padding: 15px;
    }

    h1 {
      font-size: clamp(22px, 6vw, 40px);
      margin-bottom: 30px;
    }

    .btn-container {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    button {
      padding: 12px 25px;
      font-size: clamp(14px, 4vw, 18px);
      border: none;
      border-radius: 10px;
      cursor: pointer;
      min-width: 120px;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.1);
    }

    .yes {
      background: green;
      color: white;
    }

    .no {
      background: red;
      color: white;
    }
  </style>
</head>

<body>

  <h1>Do U WANT surprise? ❤️</h1>

  <div class="btn-container">
    <button class="yes" onclick="goYes()">Yes 💖</button>
    <button class="no" onclick="goNo()">No 😢</button>
  </div>

  <script>
    function goYes() {
      window.location.href = "birthday.html";
    }

    function goNo() {
      alert("Think again 😜");
    }
  </script>

</body>
</html>

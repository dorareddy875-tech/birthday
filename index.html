<!DOCTYPE html>
<html>
<head>
  <title>Locked Page 🔐</title>

  <style>
    body {
      background: black;
      color: white;
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    input, button {
      padding: 10px;
      font-size: 18px;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
    }

    button {
      cursor: pointer;
    }

    #msg {
      color: red;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div>
  <h2>Enter Password 🔐</h2>
  <input type="password" id="pass" placeholder="Enter code">
  <br>
  <button onclick="check()">Open</button>
  <p id="msg"></p>
</div>

<script>
function check() {
  let p = document.getElementById("pass").value;

  if (p === "777") {
    window.location.href = "birthday.html";
  } else {
    document.getElementById("msg").innerHTML = "Wrong Password ❌ Try again";
  }
}
</script>

</body>
</html>

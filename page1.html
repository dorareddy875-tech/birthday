<!DOCTYPE html>
<html>
<head>
  <title>Question ❤️</title>
  <style>
    body {
      text-align: center;
      font-family: Arial;
      background: linear-gradient(to right,#ff758c,#ff7eb3);
      color: white;
      margin-top: 100px;
    }

    h1 {
      font-size: 40px;
    }

    button {
      padding: 15px 30px;
      font-size: 18px;
      margin: 20px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    .yes {
      background: green;
      color: white;
    }

    .no {
      background: red;
      color: white;
    }
  </style>
</head>
<body>

  <h1>DO U WANT SURPRISE ❤️</h1>

  <button class="yes" onclick="goYes()">Yes 💖</button>
  <button class="no" onclick="goNo()">No 😢</button>

  <script>
    function goYes() {
      window.location.href = "birthday.html"; // go to birthday page
    }

    function goNo() {
      alert("Think again 😜");
    }
  </script>

</body>
</html>
